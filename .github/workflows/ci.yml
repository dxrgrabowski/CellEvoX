name: CellEvoX Performance-Critical CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      benchmark_groups:
        description: "Benchmark groups to run: quick, timing, snapshot, all"
        required: false
        default: "quick"

jobs:
  bench-regression-check:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Head (Current PR or New Main Commit)
      uses: actions/checkout@v4
      with:
        path: head

    - name: Install Dependencies
      run: |
        sudo apt-get update
        # libboost-program-options-dev is kept here so CI can still build the
        # pre-cleanup base commit for benchmark comparison.
        sudo apt-get install -y build-essential cmake libspdlog-dev libboost-program-options-dev libtbb-dev libeigen3-dev nlohmann-json3-dev python3-dev python3-numpy python3-matplotlib ccache

    - name: Setup Ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache-${{ github.ref_name }}
        restore-keys: |
          ${{ runner.os }}-ccache-main

    - name: Determine Base Commit
      id: base_info
      run: |
        set -euo pipefail
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        elif [ "${{ github.event_name }}" = "push" ]; then
          BASE_SHA="${{ github.event.before }}"
        else
          BASE_SHA=""
        fi

        cd head
        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          echo "Base SHA missing; falling back to origin/main"
          git fetch origin main --depth=1
          BASE_SHA=$(git rev-parse FETCH_HEAD)
        fi

        echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
        echo "Comparing against SHA: $BASE_SHA"

    - name: Checkout Base Commit
      run: |
        set -euo pipefail
        mkdir base_repo
        git -C base_repo init
        git -C base_repo remote add origin https://github.com/${{ github.repository }}.git
        git -C base_repo fetch --depth=1 origin "${{ steps.base_info.outputs.base_sha }}"
        git -C base_repo checkout --detach FETCH_HEAD

    - name: Build Base (Exact Comparison Commit)
      run: |
        cmake -B base_build -S base_repo/CellEvoX -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DSKIP_GUI=ON
        cmake --build base_build --target CellEvoXTests -j$(nproc)

    - name: Build Head (Current PR)
      run: |
        cmake -B head_build -S head/CellEvoX -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCELLEVOX_WARNINGS_AS_ERRORS=ON
        cmake --build head_build --target CellEvoX CellEvoXTests -j$(nproc)

    - name: Run Unit Tests
      run: ./head_build/bin/CellEvoXTests "~[benchmark]"

    - name: Paired Performance Gate
      env:
        BENCHMARK_GROUPS: ${{ inputs.benchmark_groups || 'quick' }}
      run: |
        mkdir -p benchmark_reports
        python3 head/CellEvoX/tests/benchmarks/ci_benchmark_gate.py \
          --base-binary base_build/bin/CellEvoXTests \
          --head-binary head_build/bin/CellEvoXTests \
          --groups "$BENCHMARK_GROUPS" \
          --initial-samples 30 \
          --retry-samples 60 \
          --threshold 0.05 \
          --memory-threshold 0.10 \
          --max-relative-ci 0.05 \
          --fail-on-inconclusive \
          --benchmark-warmup-time 200 \
          --benchmark-resamples 20000 \
          --benchmark-confidence-interval 0.95 \
          --out-dir benchmark_reports \
          --report-json benchmark_reports/perf-gate.json

    - name: Upload Benchmark Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-reports
        path: benchmark_reports
